const { useState, useEffect, useRef } = React;

// ============ palette ============
const C = {

const LEVELS = {

// ============ shared UI ============
function Label({ children }) {
  return <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: 2, color: C.accent, marginBottom: 10, display: "flex", alignItems: "center", gap: 10 }}>
    <span style={{ width: 22, height: 2, background: C.accent }} />{children}</div>;
}
function Card({ children, accent, style }) {
  return <div style={{ position: "relative", background: C.panel, border: "1px solid " + C.line, borderRadius: 14, padding: "16px 18px", boxShadow: "0 2px 8px rgba(0,0,0,0.05)", ...style }}>
    {accent && <div style={{ position: "absolute", insetInlineEnd: 0, top: 0, bottom: 0, width: 5, background: accent, borderRadius: "0 14px 14px 0" }} />}
    {children}</div>;
}

function fmt(s) { s = Math.max(0, Math.floor(s)); return Math.floor(s / 60) + ":" + (s % 60).toString().padStart(2, "0"); }

// ============ Inline timer (compact, sits inside screens) ============
function InlineTimer({ segments, label }) {
  const [idx, setIdx] = useState(0);
  const [rem, setRem] = useState(segments[0].min * 60);
  const [run, setRun] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    if (run) ref.current = setInterval(() => setRem(r => r <= 1 ? 0 : r - 1), 1000);
    return () => clearInterval(ref.current);
  }, [run]);
  const seg = segments[idx];
  const col = seg.color || C.accent;
  function go(n) { setIdx(n); setRem(segments[n].min * 60); setRun(false); }
  return (
    <Card accent={col} style={{ marginBottom: 22 }}>
      <Label>{label}</Label>
      <div style={{ display: "flex", alignItems: "center", gap: 18, flexWrap: "wrap" }}>
        <div style={{ fontSize: 46, fontWeight: 800, color: rem === 0 ? C.accent : C.ink, fontVariantNumeric: "tabular-nums", letterSpacing: -1, minWidth: 110, textAlign: "center" }}>{fmt(rem)}</div>
        <div style={{ flex: 1, minWidth: 180 }}>
          <div style={{ fontSize: 15, fontWeight: 700, color: col }}>{seg.name}</div>
          <div style={{ fontSize: 12.5, color: C.sub }}>{rem === 0 ? "הזמן הסתיים, אפשר להתקדם" : "הקצאה: " + seg.min + " דקות"}</div>
        </div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          <button onClick={() => setRun(r => !r)} style={{ background: run ? "#fff" : col, color: run ? col : "#fff", border: "2px solid " + col, borderRadius: 10, padding: "9px 20px", fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: BF }}>{run ? "השהה" : "התחל"}</button>
          <button onClick={() => go(idx)} style={ghost}>אפס</button>
          {idx > 0 && <button onClick={() => go(idx - 1)} style={ghost}>הקודם</button>}
          {idx < segments.length - 1 && <button onClick={() => go(idx + 1)} style={ghost}>הבא</button>}
        </div>
      </div>
      {segments.length > 1 && (
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginTop: 12 }}>
          {segments.map((s, i) => (
            <button key={i} onClick={() => go(i)} style={{ flex: "1 1 auto", minWidth: 70, background: i === idx ? (s.color || C.accent) : "#fff", color: i === idx ? "#fff" : C.sub, border: "1px solid " + (i === idx ? "transparent" : C.line), borderRadius: 8, padding: "6px 4px", fontSize: 11.5, fontWeight: 600, cursor: "pointer", fontFamily: BF }}>
              {s.name}<div style={{ fontSize: 10, opacity: 0.8 }}>{s.min} דק</div></button>
          ))}
        </div>
      )}
    </Card>
  );
}
const ghost = { background: "#fff", color: C.sub, border: "1px solid " + C.line, borderRadius: 10, padding: "9px 14px", fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: BF };

// ============ TAB: GENERAL ============

    "מבחינת מיקומו בתהליך הכולל, מפגש שלוש הוא התשתית למפגש הרביעי, כתיבת תוכניות העבודה. הרעיונות, הפעולות ונקודות המינוף שיזוהו כאן הם חומר הגלם שכל קבוצה תבחר ממנו ותעבד אותו לכדי תוכנית קונקרטית. שתי הסדנאות שבמפגש משרתות מטרה זו בהדרגה: הסדנה הראשונה מבססת את ההבנה המושגית, זיהוי רמת המינוף של תרחישים נתונים והעמקתם; והשנייה, לב המפגש, מעבירה את המשתתפים לחשיבת פעולות ממשית ברמה האישית, האגפית והבין-אגפית, תוך התלבשות על מנגנונים קיימים ולא המצאת פרויקטים חדשים.",
  ];

      <Label>נקודות מינוף</Label>

      {paras.map((p, i) => (
        <p key={i} style={{ fontSize: 15.5, lineHeight: 1.85, color: C.ink, margin: "0 0 16px", textAlign: "justify" }}>{p}</p>
      ))}
    </div>
  );
}

            <div style={{ width: 120, padding: "10px 16px", color: C.accentSoft, fontWeight: 600 }}>{r[1]}</div>
            <div style={{ width: 90, padding: "10px 16px", color: C.sub }}>{r[2]}</div>
          </div>
        ))}
      </div>

      <InlineTimer label="טיימר, מילוי הקנווס רמה אחר רמה" segments={[
        { name: "פרמטרים", min: 10, color: LEVELS["פרמטרים"].color },
        { name: "לולאות משוב", min: 10, color: LEVELS["לולאות משוב"].color },
        { name: "מבנה ועיצוב", min: 12, color: LEVELS["מבנה ועיצוב"].color },
        { name: "תכלית וכוונה", min: 12, color: LEVELS["תכלית וכוונה"].color },
        { name: "סימון רעיונות", min: 6, color: C.gold },
      ]} />

      {/* canvas explanation */}
      <Card accent={C.accent} style={{ marginBottom: 14 }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: C.accent, marginBottom: 8 }}>איך עובדים על הקנווס</div>
        <p style={{ margin: "0 0 8px", fontSize: 14.5, color: C.ink, lineHeight: 1.7 }}>הקבוצה מקבלת תימה אחת ועובדת עליה דרך ארבע הרמות. בכל רמה רושמים הצעות לפעולה בשלוש זוויות: אישי (מה המפקח יכול לעשות), אגפי (מה האגף יכול להוביל) ובינאגפי (מה דורש חיבור בין אגפים). ממלאים רמה שלמה ואז עוברים לבאה.</p>
        <div style={{ display: "grid", gap: 6 }}>
          {[
            "חשוב שיבואו לידי ביטוי דוגמאות מארבעת האגפים, ולא רק מאגף אחד.",
            "מדובר בהצעות לפעולה, לא בהכרעות. זה שלב של זריעת רעיונות.",
            "מתלבשים על מנגנונים קיימים, ולא ממציאים פרויקטים חדשים.",
          ].map((x, i) => (
            <div key={i} style={{ display: "flex", gap: 8, alignItems: "flex-start", fontSize: 13.5, color: C.ink, lineHeight: 1.6 }}>
              <span style={{ color: C.gold, fontWeight: 800 }}>•</span>{x}</div>
          ))}
        </div>
      </Card>
      <Card accent={C.gold} style={{ marginBottom: 22 }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: C.gold, marginBottom: 6 }}>דוגמה למילוי תא בקנווס</div>
        <p style={{ margin: "0 0 4px", fontSize: 14, color: C.ink, lineHeight: 1.7 }}><strong>תימה:</strong> אינדיקטורים למוביליות. <strong>רמה:</strong> מבנה ועיצוב. <strong>זווית:</strong> בינאגפי.</p>
        <p style={{ margin: 0, fontSize: 14, color: C.ink, lineHeight: 1.7 }}><strong>הצעה לפעולה:</strong> להיעזר בתוכנית הבוגרים הקיימת "יש לך כתובת" כך שנתוני הבוגרים ייאספו פעם בשנה וייסקרו יחד בפורום של ארבעת האגפים, כדי שהמידע יהפוך להחלטה משותפת.</p>
      </Card>

      {/* theme selector */}
      <Label>התימות והשאלות בארבע הרמות</Label>
      <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 16 }}>
        {THEMES.map(x => (
          <button key={x.id} onClick={() => setTheme(x.id)} style={{ flex: "1 1 auto", minWidth: 110, background: theme === x.id ? C.accent : "#fff", color: theme === x.id ? "#fff" : C.sub, border: "1px solid " + (theme === x.id ? "transparent" : C.line), borderRadius: 10, padding: "9px 8px", fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: BF, lineHeight: 1.25 }}>
            <div style={{ fontSize: 10.5, opacity: 0.7 }}>תימה {x.id}</div>{x.short}</button>
        ))}
      </div>

      <Card style={{ marginBottom: 14 }}>
        <h3 style={{ margin: "0 0 10px", fontSize: 19, fontWeight: 800, color: C.ink }}>{t.title}</h3>
        <p style={{ margin: 0, fontSize: 14.5, color: C.ink, lineHeight: 1.75 }}>{t.story}</p>
      </Card>
      <div style={{ display: "grid", gap: 12 }}>
        {Object.entries(t.levels).map(([lvl, qs]) => {
          const m = LEVELS[lvl];
          return (
            <div key={lvl} style={{ border: "1px solid " + C.line, borderRadius: 12, overflow: "hidden" }}>
              <div style={{ background: m.color + "18", borderBottom: "1px solid " + m.color + "33", padding: "9px 16px", display: "flex", alignItems: "center", gap: 9 }}>
                <span style={{ fontSize: 15, color: m.color }}>{m.icon}</span>
                <span style={{ fontSize: 15.5, fontWeight: 700, color: m.color }}>{lvl}</span>
              </div>
              <ul style={{ margin: 0, padding: "12px 16px", paddingInlineStart: 30, display: "grid", gap: 7 }}>
                {qs.map((q, i) => <li key={i} style={{ fontSize: 14, color: C.ink, lineHeight: 1.6 }}>{q}</li>)}
              </ul>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ============ TAB: LEVELS ============
function LevelsTab() {
  return (
    <div>
      <Label>רמות מינוף, ארבע הרמות</Label>
      <p style={{ fontSize: 14.5, color: C.sub, lineHeight: 1.6, margin: "0 0 18px" }}>רקע למנחה. אין צורך ללמד זאת, אלא להיעזר בו אם עולות שאלות וכדי לשייך פעולות לרמה הנכונה.</p>
      <div style={{ display: "grid", gap: 12 }}>
        {Object.entries(LEVELS).map(([lvl, m], i) => (
          <Card key={lvl} accent={m.color}>
            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 8 }}>
              <span style={{ width: 34, height: 34, borderRadius: 10, background: m.color + "1A", color: m.color, display: "grid", placeItems: "center", fontSize: 18 }}>{m.icon}</span>
              <div><div style={{ fontSize: 11, color: C.sub }}>רמה {i + 1}</div>
                <div style={{ fontSize: 17, fontWeight: 800, color: m.color }}>{lvl}</div></div>
            </div>
            <p style={{ margin: 0, fontSize: 14.5, color: C.ink, lineHeight: 1.7 }}>{m.note}</p>
            {m.q && (
              <div style={{ marginTop: 10, background: m.color + "12", border: "1px solid " + m.color + "33", borderRadius: 10, padding: "11px 14px" }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: m.color, marginBottom: 4 }}>שאלת מנחה</div>
                <p style={{ margin: 0, fontSize: 14, color: C.ink, lineHeight: 1.65 }}>{m.q}</p>
              </div>
            )}
          </Card>
        ))}
      </div>
      <div style={{ marginTop: 16, background: "linear-gradient(135deg, " + C.ink + ", " + C.inkDk + ")", borderRadius: 14, padding: "18px 20px", color: "#fff" }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: C.gold, marginBottom: 8 }}>עיקרון על</div>
        <p style={{ margin: 0, fontSize: 15, lineHeight: 1.75, opacity: 0.95 }}>ככל שיורדים מהפרמטרים אל התכלית והכוונה, השינוי קשה יותר ולא תמיד נוח, אך הוא מזיז יותר מערכת ולאורך זמן רב יותר. אין רמה אחת נכונה. המטרה לראות שאנו נוטים להתרכז בפרמטרים, ולהזמין להעמיק גם ברמות המינוף האחרות.</p>
      </div>
    </div>
  );
}

// ============ APP ============
const TABS = [
  { id: "general", label: "כללי" },
  { id: "agenda", label: "סדר יום" },
  { id: "w1", label: "סדנה 1" },
  { id: "w2", label: "סדנה 2" },
  { id: "levels", label: "רמות מינוף" },
];
function App() {
  const [tab, setTab] = useState("general");
  return (
    <div dir="rtl" style={{ fontFamily: BF, background: C.bg, minHeight: "100vh", color: C.ink }}>
      <style>{`button:disabled{opacity:.4;cursor:not-allowed} ::-webkit-scrollbar{width:9px;height:9px} ::-webkit-scrollbar-thumb{background:${C.line};border-radius:9px}`}</style>
      <header style={{ background: "linear-gradient(135deg, " + C.accent + ", #4E807C)", color: "#fff", padding: "22px 22px 18px" }}>
        <div style={{ maxWidth: 820, margin: "0 auto" }}>
          <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: 3, opacity: 0.85, marginBottom: 6 }}>מדריך מנחה</div>
          <h1 style={{ margin: 0, fontFamily: HF, fontSize: 32, fontWeight: 900 }}>מו"פ בינאגפי: מפגש 3 בנושא נקודות מינוף ומוביליות חברתית</h1>
        </div>
      </header>
      <nav style={{ position: "sticky", top: 0, zIndex: 10, background: C.bg + "F2", backdropFilter: "blur(8px)", borderBottom: "1px solid " + C.line }}>
        <div style={{ maxWidth: 820, margin: "0 auto", display: "flex", gap: 4, padding: "8px 14px", overflowX: "auto" }}>
          {TABS.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)} style={{ flex: "0 0 auto", background: tab === t.id ? C.ink : "transparent", color: tab === t.id ? "#fff" : C.sub, border: "none", borderRadius: 10, padding: "10px 16px", fontSize: 14.5, fontWeight: 700, cursor: "pointer", fontFamily: BF, whiteSpace: "nowrap" }}>{t.label}</button>
          ))}
        </div>
      </nav>
      <main style={{ maxWidth: 820, margin: "0 auto", padding: "26px 18px 70px" }}>
        {tab === "general" && <General />}
        {tab === "agenda" && <Agenda />}
        {tab === "w1" && <Workshop1 />}
        {tab === "w2" && <Workshop2 />}
        {tab === "levels" && <LevelsTab />}
      </main>
    </div>
  );
}
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>

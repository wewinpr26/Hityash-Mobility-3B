// ---------- TAB: TIMER ----------
function fmt(sec) {
  const s = Math.max(0, Math.floor(sec));
  const m = Math.floor(s / 60);
  const r = s % 60;
  return m + ":" + r.toString().padStart(2, "0");
}

function Timer() {
  const segments = ROUNDS;
  const [idx, setIdx] = useState(0);
  const [remaining, setRemaining] = useState(segments[0].min * 60);
  const [running, setRunning] = useState(false);
  const ref = useRef(null);

  useEffect(() => {
    if (running) {
      ref.current = setInterval(() => {
        setRemaining((r) => (r <= 1 ? 0 : r - 1));
      }, 1000);
    }
    return () => clearInterval(ref.current);
  }, [running]);

  const seg = segments[idx];
  const color = C.accent;
  const total = seg.min * 60;
  const pct = total > 0 ? (remaining / total) * 100 : 0;

  function go(ni) {
    setIdx(ni);
    setRemaining(segments[ni].min * 60);
    setRunning(false);
  }

  return (
    <div>
      <SectionLabel>טיימר שלב א, ארבעה סבבי תרחישים</SectionLabel>

      <div style={{ background: C.panel, border: "1px solid " + C.line, borderRadius: 20, padding: "28px 24px", textAlign: "center", position: "relative", overflow: "hidden" }}>
        <div style={{ position: "absolute", insetInlineStart: 0, top: 0, bottom: 0, width: (100 - pct) + "%", background: color + "14", transition: "width 1s linear" }} />
        <div style={{ position: "relative" }}>
          <div style={{ fontSize: 15, fontWeight: 700, color: color, marginBottom: 4 }}>
            סבב {idx + 1} מתוך {segments.length}: {seg.round}
          </div>
          <div style={{ fontSize: 84, fontWeight: 800, lineHeight: 1, color: remaining === 0 ? C.accent : C.ink, fontVariantNumeric: "tabular-nums", letterSpacing: -2, margin: "10px 0" }}>
            {fmt(remaining)}
          </div>
          {remaining === 0 && (
            <div style={{ fontSize: 18, fontWeight: 700, color: C.accent, marginBottom: 10 }}>עוברים לתרחיש הבא</div>
          )}
          <div style={{ fontSize: 13.5, color: C.sub, marginBottom: 18 }}>הקצאה: {seg.min} דקות</div>
          <div style={{ display: "flex", gap: 10, justifyContent: "center", flexWrap: "wrap" }}>
            <button onClick={() => setRunning((r) => !r)} style={{ background: running ? "#fff" : color, color: running ? color : "#fff", border: "2px solid " + color, borderRadius: 12, padding: "12px 28px", fontSize: 16, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
              {running ? "השהה" : "התחל"}
            </button>
            <button onClick={() => go(idx)} style={ghostBtn}>אפס</button>
            <button onClick={() => idx > 0 && go(idx - 1)} disabled={idx === 0} style={ghostBtn}>תרחיש קודם</button>
            <button onClick={() => idx < segments.length - 1 && go(idx + 1)} disabled={idx === segments.length - 1} style={ghostBtn}>תרחיש הבא</button>
          </div>
        </div>
      </div>

      <div style={{ marginTop: 12, display: "flex", gap: 8, flexWrap: "wrap" }}>
        {segments.map((s, i) => (
          <button key={i} onClick={() => go(i)} style={{ flex: "1 1 auto", background: i === idx ? C.accent : C.panel, color: i === idx ? "#fff" : C.sub, border: "1px solid " + (i === idx ? "transparent" : C.line), borderRadius: 10, padding: "8px 6px", fontSize: 12.5, fontWeight: 600, cursor: "pointer", fontFamily: "inherit", minWidth: 110 }}>
            {s.round}
            <div style={{ fontSize: 11, opacity: 0.8 }}>{s.min} דקות</div>
          </button>
        ))}
      </div>

      <div style={{ marginTop: 30 }}>
        <SectionLabel>לוח הזמנים המלא</SectionLabel>
        <div style={{ background: C.panel, border: "1px solid " + C.line, borderRadius: 14, overflow: "hidden" }}>
          {SCHEDULE.map((s, i) => (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: 14, padding: "13px 18px", borderBottom: i < SCHEDULE.length - 1 ? "1px solid " + C.line : "none" }}>
              <div style={{ flexShrink: 0, width: 52, fontSize: 18, fontWeight: 800, color: C.accent }}>{s.min} דק</div>
              <div style={{ flex: 1, fontSize: 15, color: C.ink }}>{s.stage}</div>
              <div style={{ fontSize: 13, color: C.sub }}>{s.cum} דק מצטבר</div>
            </div>
          ))}
        </div>
      </div>

      <div style={{ marginTop: 16, background: "#fff", border: "1px dashed " + C.accentSoft, borderRadius: 12, padding: "14px 18px", fontSize: 14, color: C.sub, lineHeight: 1.65 }}>
        <strong style={{ color: C.accent }}>מבנה שלב א:</strong> ארבעה סבבים של עשר דקות, סבב לכל תרחיש.
        בכל סבב מציגים תרחיש, מאבחנים באיזו רמה הוא עובד ובאיזה אופן, ודנים כיצד לקדם אותו לרמה משפיעה יותר.
      </div>
    </div>
  );
}

          <p style={{ margin: 0, fontSize: 14.5, color: C.ink, lineHeight: 1.7 }}>{sc.how}</p>
        </div>
      </div>

      <SectionLabel>נקודות לדיון</SectionLabel>
      <div style={{ display: "grid", gap: 8, marginBottom: 22 }}>
        {sc.points.map((p, i) => (
          <div key={i} style={{ background: C.panel, border: "1px solid " + C.line, borderRadius: 10, padding: "12px 16px", fontSize: 15, color: C.ink, lineHeight: 1.65 }}>{p}</div>
        ))}
      </div>

      <SectionLabel>איך לקדם לרמה משפיעה יותר</SectionLabel>
      <div style={{ display: "grid", gap: 10, marginBottom: 22 }}>
        {sc.promote.map(([level, text], i) => {
          const meta = LEVEL_META[level] || { color: C.gold, icon: "◆" };
          return (
            <div key={i} style={{ background: C.panel, border: "1px solid " + C.line, borderRadius: 12, padding: "14px 16px", display: "flex", gap: 12, alignItems: "flex-start" }}>
              <span style={{ flexShrink: 0, display: "inline-flex", alignItems: "center", gap: 6, background: meta.color + "1A", color: meta.color, border: "1px solid " + meta.color + "44", borderRadius: 999, padding: "4px 12px", fontSize: 13, fontWeight: 700, whiteSpace: "nowrap" }}>
                <span>{meta.icon}</span> {level}
              </span>
              <span style={{ fontSize: 14.5, color: C.ink, lineHeight: 1.65 }}>{text}</span>
            </div>
          );
        })}
      </div>

      <div style={{ background: "#FFFDF8", border: "1px solid " + C.gold + "55", borderRadius: 14, padding: "18px 20px" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 13, fontWeight: 700, color: C.gold, marginBottom: 10, letterSpacing: 1 }}>
          <span style={{ fontSize: 16 }}>✦</span> שאלות שאפשר לשאול
        </div>
        <ul style={{ margin: 0, paddingInlineStart: 18, display: "grid", gap: 8 }}>
          {sc.questions.map((q, i) => (
            <li key={i} style={{ fontSize: 15, color: C.ink, lineHeight: 1.65 }}>{q}</li>
          ))}
        </ul>
      </div>
    </div>
  );
}

function Scenarios() {
  const [sel, setSel] = useState(SCENARIOS[0].id);
  const sc = SCENARIOS.find((t) => t.id === sel);
  return (
    <div>
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 22 }}>
        {SCENARIOS.map((t) => (
          <button key={t.id} onClick={() => setSel(t.id)} style={{ flex: "1 1 auto", minWidth: 130, background: sel === t.id ? C.accent : C.panel, color: sel === t.id ? "#fff" : C.sub, border: "1px solid " + (sel === t.id ? "transparent" : C.line), borderRadius: 12, padding: "12px 10px", fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", lineHeight: 1.3 }}>
            <div style={{ fontSize: 11, opacity: 0.7, marginBottom: 2 }}>תרחיש {t.id}</div>
            {t.short}
          </button>
        ))}
      </div>
      <ScenarioView sc={sc} />
    </div>
  );
}

// ---------- TAB: CASES ----------
function Cases() {
  return (
    <div>
      <SectionLabel>מקרים ותגובות בזמן אמת</SectionLabel>
      <p style={{ fontSize: 14.5, color: C.sub, lineHeight: 1.65, marginTop: 0, marginBottom: 20 }}>
        מצבים שעשויים לעלות בדיון, עם תגובה מוצעת לכל אחד. אלה כלים לשמירה על עומק ועל אווירה לומדת.
      </p>
      <div style={{ display: "grid", gap: 14 }}>
        {CASES.map((c) => (
          <div key={c.n} style={{ background: C.panel, border: "1px solid " + C.line, borderRadius: 14, padding: "18px 20px" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 10 }}>
              <span style={{ flexShrink: 0, width: 30, height: 30, borderRadius: 9, background: C.accent, color: "#fff", display: "grid", placeItems: "center", fontWeight: 800, fontSize: 15 }}>{c.n}</span>
              <span style={{ fontSize: 17, fontWeight: 800, color: C.ink }}>{c.title}</span>
            </div>
            <p style={{ fontSize: 14.5, color: C.sub, lineHeight: 1.65, margin: "0 0 12px" }}>{c.sit}</p>
            <div style={{ background: "#fff", borderInlineStart: "4px solid " + C.accentSoft, border: "1px solid " + C.line, borderRadius: 10, padding: "13px 16px" }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: C.accentSoft, marginBottom: 6 }}>תגובה מוצעת</div>
              <p style={{ margin: 0, fontSize: 15, color: C.ink, lineHeight: 1.7 }}>{c.resp}</p>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ---------- TAB: LEVELS ----------
function Levels() {
  return (
    <div>
      <SectionLabel>נספח: דגשים מקצועיים לפי רמות</SectionLabel>
      <p style={{ fontSize: 14.5, color: C.sub, lineHeight: 1.65, marginTop: 0, marginBottom: 20 }}>
        רקע למנחה על ארבע רמות המינוף. אין צורך ללמד זאת, אלא להיעזר בו אם עולות שאלות, וכדי לעזור לקבוצה לשייך פעולות לרמה הנכונה.
      </p>
      <div style={{ display: "grid", gap: 14 }}>
        {Object.entries(LEVEL_META).map(([level, meta], i) => (
          <div key={level} style={{ background: C.panel, border: "1px solid " + C.line, borderInlineStart: "5px solid " + meta.color, borderRadius: 14, padding: "18px 20px" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 10 }}>
              <span style={{ width: 36, height: 36, borderRadius: 10, background: meta.color + "1A", color: meta.color, display: "grid", placeItems: "center", fontSize: 20 }}>{meta.icon}</span>
              <div>
                <div style={{ fontSize: 11, color: C.sub }}>רמה {i + 1}</div>
                <div style={{ fontSize: 18, fontWeight: 800, color: meta.color }}>{level}</div>
              </div>
            </div>
            <p style={{ margin: 0, fontSize: 15, color: C.ink, lineHeight: 1.75 }}>{meta.note}</p>
          </div>
        ))}
      </div>

      <div style={{ marginTop: 20, background: "linear-gradient(135deg, " + C.ink + ", #1C2624)", borderRadius: 14, padding: "20px 22px", color: "#fff" }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: C.gold, marginBottom: 8 }}>עיקרון על</div>
        <p style={{ margin: 0, fontSize: 15.5, lineHeight: 1.8, opacity: 0.95 }}>
          ככל שיורדים מהפרמטרים אל התכלית והכוונה, השינוי קשה יותר ולא תמיד נוח, אך הוא מזיז יותר מערכת ולאורך זמן רב יותר. אין רמה אחת נכונה. המטרה לראות שאנו נוטים להתרכז בפרמטרים, ולהתאמן לגעת גם בעמוק.
        </p>
      </div>
    </div>
  );
}

// ===================== APP =====================

const TABS = [
  { id: "overview", label: "סקירה", icon: "◷" },
  { id: "timer", label: "זמנים וטיימר", icon: "⏱" },
  { id: "stages", label: "שלבי הסדנה", icon: "▤" },
  { id: "scenarios", label: "התרחישים", icon: "◎" },
  { id: "cases", label: "מקרים ותגובות", icon: "✦" },
  { id: "levels", label: "נספח רמות", icon: "◆" },
];

function App() {
  const [tab, setTab] = useState("overview");

  return (
    <div dir="rtl" style={{ fontFamily: "'Heebo', 'Assistant', system-ui, sans-serif", background: C.bg, minHeight: "100vh", color: C.ink }}>
      <style>{`
        * { box-sizing: border-box; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-thumb { background: ${C.line}; border-radius: 10px; }
      `}</style>

      <header style={{ background: "linear-gradient(135deg, " + C.accent + ", #4E807C)", color: "#fff", padding: "26px 22px 20px" }}>
        <div style={{ maxWidth: 860, margin: "0 auto" }}>
          <div style={{ fontSize: 12.5, fontWeight: 700, letterSpacing: 3, opacity: 0.85, marginBottom: 8 }}>מדריך מנחה · יום למידה שלישי</div>
          <h1 style={{ margin: 0, fontFamily: "'Frank Ruhl Libre', serif", fontSize: 38, fontWeight: 900, lineHeight: 1.1 }}>פעילות 1 · באיזו רמה זה עובד</h1>
          <p style={{ margin: "10px 0 0", fontSize: 15, opacity: 0.9, maxWidth: 620, lineHeight: 1.6 }}>
            אבחון תרחישים וקידום מינוף. מדריך הפעלה למנחה, כולל זמנים, תסריט, תרחישים ומקרים מהשטח.
          </p>
        </div>
      </header>

      <nav style={{ position: "sticky", top: 0, zIndex: 10, background: C.bg + "F2", backdropFilter: "blur(8px)", borderBottom: "1px solid " + C.line }}>
        <div style={{ maxWidth: 860, margin: "0 auto", display: "flex", gap: 4, padding: "8px 14px", overflowX: "auto" }}>
          {TABS.map((t) => (
            <button key={t.id} onClick={() => setTab(t.id)} style={{ flex: "0 0 auto", display: "flex", alignItems: "center", gap: 7, background: tab === t.id ? C.ink : "transparent", color: tab === t.id ? "#fff" : C.sub, border: "none", borderRadius: 10, padding: "10px 16px", fontSize: 14.5, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", whiteSpace: "nowrap", transition: "all 0.15s" }}>
              <span style={{ fontSize: 15, opacity: 0.85 }}>{t.icon}</span>
              {t.label}
            </button>
          ))}
        </div>
      </nav>

      <main style={{ maxWidth: 860, margin: "0 auto", padding: "28px 18px 80px" }}>
        {tab === "overview" && <Overview />}
        {tab === "timer" && <Timer />}
        {tab === "stages" && <Stages />}
        {tab === "scenarios" && <Scenarios />}
        {tab === "cases" && <Cases />}
        {tab === "levels" && <Levels />}
      </main>
    </div>
  );
}

const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(<App />);
</script>
</body>
</html>

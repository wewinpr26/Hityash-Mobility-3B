// ---------- TAB: TIMER / SCHEDULE ----------
function fmt(sec) {
  const s = Math.max(0, Math.floor(sec));
  const m = Math.floor(s / 60);
  const r = s % 60;
  return `${m}:${r.toString().padStart(2, "0")}`;
}

function Timer() {
  const segments = STAGE_B; // level timer
  const [idx, setIdx] = useState(0);
  const [remaining, setRemaining] = useState(segments[0].min * 60);
  const [running, setRunning] = useState(false);
  const ref = useRef(null);

  useEffect(() => {
    if (running) {
      ref.current = setInterval(() => {
        setRemaining((r) => {
          if (r <= 1) {
            return 0;
          }
          return r - 1;
        });
      }, 1000);
    }
    return () => clearInterval(ref.current);
  }, [running]);

  const seg = segments[idx];
  const meta = LEVEL_META[seg.level] || { color: C.gold };
  const total = seg.min * 60;
  const pct = total > 0 ? (remaining / total) * 100 : 0;
  const isLevelTimer = true;

  function next() {
    if (idx < segments.length - 1) {
      const ni = idx + 1;
      setIdx(ni);
      setRemaining(segments[ni].min * 60);
      setRunning(false);
    }
  }
  function prev() {
    if (idx > 0) {
      const ni = idx - 1;
      setIdx(ni);
      setRemaining(segments[ni].min * 60);
      setRunning(false);
    }
  }
  function reset() {
    setRemaining(seg.min * 60);
    setRunning(false);
  }

  return (
    <div>
      <SectionLabel>טיימר שלב ב — מעבר בין רמות</SectionLabel>

      <div
        style={{
          background: C.panel,
          border: `1px solid ${C.line}`,
          borderRadius: 20,
          padding: "28px 24px",
          textAlign: "center",
          position: "relative",
          overflow: "hidden",
        }}
      >
        <div
          style={{
            position: "absolute",
            insetInlineStart: 0,
            top: 0,
            bottom: 0,
            width: `${100 - pct}%`,
            background: meta.color + "14",
            transition: "width 1s linear",
          }}
        />
        <div style={{ position: "relative" }}>
          <div
            style={{
              display: "inline-flex",
              alignItems: "center",
              gap: 8,
              fontSize: 15,
              fontWeight: 700,
              color: meta.color,
              marginBottom: 4,
            }}
          >
            <span style={{ fontSize: 18 }}>{meta.icon}</span>
            רמה {idx + 1} מתוך {segments.length}: {seg.level}
          </div>
          <div
            style={{
              fontSize: 84,
              fontWeight: 800,
              lineHeight: 1,
              color: remaining === 0 ? C.accent : C.ink,
              fontVariantNumeric: "tabular-nums",
              letterSpacing: -2,
              margin: "10px 0",
            }}
          >
            {fmt(remaining)}
          </div>
          {remaining === 0 && (
            <div
              style={{
                fontSize: 18,
                fontWeight: 700,
                color: C.accent,
                marginBottom: 10,
              }}
            >
              עוברים לרמה הבאה
            </div>
          )}
          <div style={{ fontSize: 13.5, color: C.sub, marginBottom: 18 }}>
            הקצאה: {seg.min} דקות
          </div>

          <div
            style={{
              display: "flex",
              gap: 10,
              justifyContent: "center",
              flexWrap: "wrap",
            }}
          >
            <button
              onClick={() => setRunning((r) => !r)}
              style={{
                background: running ? "#fff" : meta.color,
                color: running ? meta.color : "#fff",
                border: `2px solid ${meta.color}`,
                borderRadius: 12,
                padding: "12px 28px",
                fontSize: 16,
                fontWeight: 700,
                cursor: "pointer",
                fontFamily: "inherit",
              }}
            >
              {running ? "השהה" : "התחל"}
            </button>
            <button onClick={reset} style={ghostBtn}>
              אפס
            </button>
            <button onClick={prev} disabled={idx === 0} style={ghostBtn}>
              רמה קודמת
            </button>
            <button
              onClick={next}
              disabled={idx === segments.length - 1}
              style={ghostBtn}
            >
              רמה הבאה
            </button>
          </div>
        </div>
      </div>

      <div style={{ marginTop: 12, display: "flex", gap: 8, flexWrap: "wrap" }}>
        {segments.map((s, i) => (
          <button
            key={i}
            onClick={() => {
              setIdx(i);
              setRemaining(s.min * 60);
              setRunning(false);
            }}
            style={{
              flex: "1 1 auto",
              background: i === idx ? (LEVEL_META[s.level]?.color || C.gold) : C.panel,
              color: i === idx ? "#fff" : C.sub,
              border: `1px solid ${i === idx ? "transparent" : C.line}`,
              borderRadius: 10,
              padding: "8px 6px",
              fontSize: 12.5,
              fontWeight: 600,
              cursor: "pointer",
              fontFamily: "inherit",
              minWidth: 80,
            }}
          >
            {s.level}
            <div style={{ fontSize: 11, opacity: 0.8 }}>{s.min}׳</div>
          </button>
        ))}
      </div>

      <div style={{ marginTop: 30 }}>
        <SectionLabel>לוח הזמנים המלא</SectionLabel>
        <div
          style={{
            background: C.panel,
            border: `1px solid ${C.line}`,
            borderRadius: 14,
            overflow: "hidden",
          }}
        >
          {SCHEDULE.map((s, i) => (
            <div
              key={i}
              style={{
                display: "flex",
                alignItems: "center",
                gap: 14,
                padding: "13px 18px",
                borderBottom:
                  i < SCHEDULE.length - 1 ? `1px solid ${C.line}` : "none",
              }}
            >
              <div
                style={{
                  flexShrink: 0,
                  width: 52,
                  fontSize: 18,
                  fontWeight: 800,
                  color: C.accent,
                }}
              >
                {s.min}׳
              </div>
              <div style={{ flex: 1, fontSize: 15, color: C.ink }}>{s.stage}</div>
              <div style={{ fontSize: 13, color: C.sub }}>{s.cum}׳ מצטבר</div>
            </div>
          ))}
        </div>
      </div>

      <div
        style={{
          marginTop: 16,
          background: "#fff",
          border: `1px dashed ${C.accentSoft}`,
          borderRadius: 12,
          padding: "14px 18px",
          fontSize: 14,
          color: C.sub,
          lineHeight: 1.65,
        }}
      >
        <strong style={{ color: C.accent }}>מנגנון המעבר:</strong> בכל פרק זמן
        עוסקים ברמה אחת בלבד. כשנגמר הזמן, הכריזו בקול “עוברים לרמה הבאה”.
        אם הקבוצה לא סיימה, ממשיכים בכל זאת. עדיף לגעת בכל ארבע הרמות מאשר למצות אחת.
      </div>
    </div>
  );
}
